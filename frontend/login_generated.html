<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure Access - Sign In</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#d7dbd9",
                    "inverse-surface": "#2d3130",
                    "on-tertiary-fixed-variant": "#72361b",
                    "on-primary": "#ffffff",
                    "outline-variant": "#bdc9c6",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#e0e3e1",
                    "on-secondary-fixed-variant": "#2e4c48",
                    "secondary-fixed-dim": "#accdc8",
                    "primary-fixed": "#9cf2e8",
                    "on-tertiary-fixed": "#370e00",
                    "on-surface-variant": "#3e4947",
                    "surface-container": "#ebefed",
                    "on-secondary-fixed": "#00201d",
                    "secondary-container": "#c5e6e1",
                    "on-tertiary-container": "#ffe5db",
                    "inverse-on-surface": "#eef1f0",
                    "secondary": "#466460",
                    "surface-variant": "#e0e3e1",
                    "surface-bright": "#f7faf8",
                    "primary-fixed-dim": "#80d5cb",
                    "on-surface": "#181c1c",
                    "tertiary-fixed-dim": "#ffb598",
                    "primary-container": "#0f766e",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#00504a",
                    "primary": "#005c55",
                    "on-primary-fixed": "#00201d",
                    "surface": "#f7faf8",
                    "on-error-container": "#93000a",
                    "tertiary": "#7f4025",
                    "on-background": "#181c1c",
                    "surface-container-low": "#f1f4f3",
                    "error": "#ba1a1a",
                    "surface-tint": "#006a63",
                    "surface-container-high": "#e5e9e7",
                    "tertiary-fixed": "#ffdbce",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#a3faef",
                    "on-error": "#ffffff",
                    "inverse-primary": "#80d5cb",
                    "secondary-fixed": "#c8e9e4",
                    "tertiary-container": "#9c573a",
                    "on-secondary": "#ffffff",
                    "outline": "#6e7977",
                    "on-secondary-container": "#4a6864",
                    "background": "#f7faf8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": [
                            "Plus Jakarta Sans"
                    ],
                    "display": [
                            "Plus Jakarta Sans"
                    ],
                    "body": [
                            "Plus Jakarta Sans"
                    ],
                    "label": [
                            "Public Sans"
                    ]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body antialiased min-h-screen relative flex flex-col selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-background text-primary font-headline text-lg w-full">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="lock_person">lock_person</span>
<span class="text-xl font-headline font-bold text-primary">Secure Access</span>
</div>
<!-- Optional trailing action could go here based on typical appbar, but JSON doesn't specify -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col justify-center items-center px-4 pt-24 pb-28 relative overflow-hidden">
<!-- Subtle Background Decoration -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0 flex items-center justify-center">
<div class="w-[150%] h-[150%] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-container to-background opacity-60 rounded-full blur-3xl transform -translate-y-1/4"></div>
</div>
<!-- Auth Card -->
<div class="w-full max-w-sm bg-surface-container-lowest rounded-2xl shadow-lg border border-surface-container-low p-8 relative z-10">
<!-- Header Section -->
<div class="text-center mb-8">
<h1 class="font-headline text-3xl font-extrabold text-on-surface mb-2 tracking-tight">Welcome Back</h1>
<p class="font-body text-sm text-on-surface-variant leading-relaxed">Sign in to continue to your community</p>
</div>
<!-- Social Sign In -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface font-label font-semibold text-sm hover:bg-surface-container-low transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 active:scale-95">
<!-- Simple SVG for Google 'G' -->
<svg height="18" viewbox="0 0 48 48" width="18" xmlns="http://www.w3.org/2000/svg">
<path d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" fill="#EA4335"></path>
<path d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" fill="#4285F4"></path>
<path d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" fill="#FBBC05"></path>
<path d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" fill="#34A853"></path>
</svg>
                Sign in with Google
            </button>
<!-- Separator -->
<div class="flex items-center my-6">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="mx-4 text-xs font-label text-outline uppercase tracking-wider">or sign in with email</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Email/Password Form -->
<form action="#" class="space-y-5" method="POST">
<div class="space-y-1.5">
<label class="block font-label text-sm font-medium text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-xl bg-surface-container-lowest text-on-surface placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-shadow font-body text-sm sm:text-base outline-none" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex items-center justify-between">
<label class="block font-label text-sm font-medium text-on-surface" for="password">Password</label>
<a class="font-label text-xs font-semibold text-primary hover:text-surface-tint transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="key">key</span>
</span>
<input class="block w-full pl-10 pr-10 py-3 border border-outline-variant rounded-xl bg-surface-container-lowest text-on-surface placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-shadow font-body text-sm sm:text-base outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full flex items-center justify-center py-3.5 px-4 mt-2 rounded-xl bg-primary text-on-primary font-label font-bold text-base shadow-sm hover:bg-surface-tint hover:shadow transition-all duration-200 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
                    Sign In
                </button>
</form>
<!-- Optional Sign Up Link -->
<div class="mt-6 text-center">
<p class="font-body text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label font-semibold text-primary hover:text-surface-tint transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center py-3 px-4 bg-surface-container-low shadow-[0_-1px_3px_rgba(0,0,0,0.05)] rounded-t-xl">
<!-- Active Tab: Sign In -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-6 py-1 hover:bg-surface-container-high active:scale-95 duration-150 transition-all cursor-default" href="#">
<span class="material-symbols-outlined mb-1" data-icon="login" data-weight="fill" style="font-variation-settings: 'FILL' 1;">login</span>
<span class="font-label text-label-sm font-medium">Sign In</span>
</a>
<!-- Inactive Tab: Help -->
<a class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-1 hover:bg-surface-container-high rounded-xl active:scale-95 duration-150 transition-all cursor-pointer" href="#">
<span class="material-symbols-outlined mb-1" data-icon="help_outline">help_outline</span>
<span class="font-label text-label-sm font-medium">Help</span>
</a>
</nav>
</body></html>
